name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release-auth:
    runs-on: ubuntu-latest
    outputs:
      token_available: ${{ steps.detect.outputs.token_available }}
    steps:
      - name: Detect the optional PyPI API token
        id: detect
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [[ -n "$PYPI_API_TOKEN" ]]; then
            echo "token_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "token_available=false" >> "$GITHUB_OUTPUT"
          fi

  model-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: e5-small-${{ runner.os }}
      - run: python -m pip install dist/*.whl
      - name: Exercise the real local embedding model
        run: |
          python - <<'PY'
          from hwp_rag_mcp.embeddings import create_local_embeddings

          embeddings = create_local_embeddings()
          vector = embeddings.embed_query("한국어 검색 스모크 테스트")
          assert len(vector) > 0
          PY

  testpypi:
    if: needs.release-auth.outputs.token_available != 'true'
    needs: [build, model-smoke, release-auth]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  testpypi-smoke:
    if: needs.release-auth.outputs.token_available != 'true'
    needs: [testpypi, release-auth]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the exact version from TestPyPI
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "hwp-rag-mcp==${VERSION}"
          hwp-rag-mcp --version
      - name: Smoke-test agent setup from the published package
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/fake-bin"
          printf '#!/usr/bin/env sh\nexit 0\n' > "$RUNNER_TEMP/fake-bin/codex"
          printf '#!/usr/bin/env sh\nexit 0\n' > "$RUNNER_TEMP/fake-bin/uvx"
          chmod +x "$RUNNER_TEMP/fake-bin/codex" "$RUNNER_TEMP/fake-bin/uvx"
          PATH="$RUNNER_TEMP/fake-bin:$PATH" hwp-rag-mcp setup \
            --client codex \
            --dataset-dir "$RUNNER_TEMP/HWP 문서" \
            --dry-run

  pypi:
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build.result == 'success' &&
      needs.model-smoke.result == 'success' &&
      needs.release-auth.result == 'success' &&
      (needs.release-auth.outputs.token_available == 'true' ||
      needs.testpypi-smoke.result == 'success')
    needs: [build, model-smoke, release-auth, testpypi-smoke]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish with the configured API token
        if: needs.release-auth.outputs.token_available == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Publish with PyPI Trusted Publishing
        if: needs.release-auth.outputs.token_available != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
